worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    server {
        listen 8099;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # SvelteKit static adapter uses 404.html as the SPA fallback router.
        # HA ingress strips /api/hassio_ingress/{token}/ server-side but the
        # browser URL retains the full prefix, breaking SvelteKit's router.
        # sub_filter injects a script that strips the prefix via history.replaceState
        # before SvelteKit's deferred module scripts initialise.
        location / {
            gzip off;
            sub_filter '</head>' '<script>!function(){var p=window.location.pathname,m=p.match(/^\/api\/hassio_ingress\/[^\/]+/);if(m)history.replaceState(null,"",p.slice(m[0].length)||"/")}()</script></head>';
            sub_filter_once on;
            try_files $uri $uri/index.html /404.html;
        }

        # Long-lived cache for content-hashed JS/CSS bundles
        location ~* \.(js|css|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Short cache for images and SVGs
        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
            expires 30d;
            add_header Cache-Control "public";
        }

        # Security headers
        # X-Frame-Options intentionally omitted — HA ingress loads addon UIs in an
        # iframe; SAMEORIGIN would block the browser from displaying the panel.
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }
}
