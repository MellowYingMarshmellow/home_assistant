worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    server {
        listen 8099;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # HA Supervisor sets X-Ingress-Path on every proxied request.
        # sub_filter rewrites absolute /_app/ asset paths to include the
        # ingress token prefix so the browser fetches assets back through
        # the ingress proxy rather than directly from the HA server root.
        # When accessed directly (no X-Ingress-Path header), the variable
        # is empty and the replacement is a no-op: /_app/ → /_app/.

        location / {
            gzip off;
            # Strip ingress prefix from window.location before SvelteKit router runs
            sub_filter '</head>' '<script>!function(){var p=window.location.pathname,m=p.match(/^\/api\/hassio_ingress\/[^\/]+/);if(m)history.replaceState(null,"",p.slice(m[0].length)||"/")}()</script></head>';
            # Rewrite /_app/ references to go through the ingress proxy
            sub_filter '/_app/' '$http_x_ingress_path/_app/';
            sub_filter_once off;
            try_files $uri $uri/index.html /404.html;
        }

        # JS bundles contain dynamic imports with absolute /_app/ paths —
        # rewrite these too so lazy-loaded chunks resolve through ingress.
        location ~* \.(js|mjs)$ {
            gzip off;
            sub_filter_types application/javascript text/javascript;
            sub_filter '/_app/' '$http_x_ingress_path/_app/';
            sub_filter_once off;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.(css|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
            expires 30d;
            add_header Cache-Control "public";
        }

        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }
}
